<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '註冊' : 'Register'">Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar-simple}"></nav>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-75">
            <div class="col-md-6 col-lg-5">
                <div class="card-lms p-4">
                    <div class="text-center mb-4">
                        <h2 class="page-title" th:text="${currentLang == 'zh'} ? '註冊' : 'Register'">Register</h2>
                        <p class="text-muted-custom" th:text="${currentLang == 'zh'} ? '創建你的帳戶' : 'Create your account'">Create your account</p>
                    </div>
                    
                    <div th:if="${param.error}" class="alert-lms alert-lms-danger mb-3" th:text="${currentLang == 'zh'} ? '用戶名已存在' : 'Username already exists'"></div>
                    
                    <form th:action="@{/register}" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '用戶名 *' : 'Username *'">Username *</label>
                                <input type="text" name="username" class="form-control form-control-lms" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '密碼 *' : 'Password *'">Password *</label>
                                <input type="password" name="password" class="form-control form-control-lms" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '全名' : 'Full Name'">Full Name</label>
                            <input type="text" name="fullName" class="form-control form-control-lms">
                        </div>
                        <div class="mb-3">
                            <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電郵' : 'Email'">Email</label>
                            <input type="email" name="email" class="form-control form-control-lms">
                        </div>
                        <div class="mb-3">
                            <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電話' : 'Phone'">Phone</label>
                            <input type="tel" name="phone" class="form-control form-control-lms">
                        </div>
                        <button type="submit" class="btn-lms btn-lms-primary w-100" th:text="${currentLang == 'zh'} ? '註冊' : 'Register'">Register</button>
                    </form>
                    
                    <p class="text-center mt-4 mb-0">
                        <span class="text-muted-custom" th:text="${currentLang == 'zh'} ? '已有帳戶？' : 'Already have an account?'">Already have an account?</span>
                        <a href="#" th:href="@{/login}" class="text-accent" th:text="${currentLang == 'zh'} ? '登入' : 'Login'">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .min-vh-75 {
            min-height: 75vh;
        }
    </style>
</body>
</html>
