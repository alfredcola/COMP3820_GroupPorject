<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '考勤簽到' : 'Attendance Check-in'">Attendance Check-in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar-simple}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${currentLang == 'zh'} ? '考勤簽到' : 'Attendance Check-in'">Attendance Check-in</h1>
            <p th:text="${currentLang == 'zh'} ? '掃描二維碼或輸入考勤碼' : 'Scan QR code or enter attendance code'">Scan QR code or enter attendance code</p>
        </div>
    </div>

    <div class="container">
        <div th:if="${param.success}" class="alert-lms alert-lms-success mb-4" th:text="${currentLang == 'zh'} ? '簽到成功！' : 'Check-in successful'"></div>
        <div th:if="${param.error == '1'}" class="alert-lms alert-lms-danger mb-4" th:text="${currentLang == 'zh'} ? '請先登入' : 'Please login first'"></div>
        <div th:if="${param.error == '2'}" class="alert-lms alert-lms-danger mb-4" th:text="${currentLang == 'zh'} ? '無效的二維碼或會話已結束' : 'Invalid QR code or session has ended'"></div>
        <div th:if="${param.error == '3'}" class="alert-lms alert-lms-warning mb-4" th:text="${currentLang == 'zh'} ? '您已經簽過到了' : 'You have already checked in'"></div>

        <div class="card-lms mb-4" th:if="${isLoggedIn}">
            <div class="card-header d-flex align-items-center">
                <span class="me-2">⌨️</span>
                <span th:text="${currentLang == 'zh'} ? '手動輸入考勤碼' : 'Enter Attendance Code Manually'">Enter Attendance Code Manually</span>
            </div>
            <div class="card-body">
                <form th:action="@{/attendance/mark}" method="post">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '考勤碼' : 'Attendance Code'">Attendance Code</label>
                            <input type="text" name="code" class="form-control form-control-lms" required th:placeholder="${currentLang == 'zh'} ? '輸入老師提供的考勤碼' : 'Enter the code from your teacher'" style="text-transform: uppercase;">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button type="submit" class="btn-lms btn-lms-primary w-100" th:text="${currentLang == 'zh'} ? '簽到' : 'Check In'">Check In</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card-lms mb-4" th:if="${isLoggedIn and myAttendance != null and not #lists.isEmpty(myAttendance)}">
            <div class="card-header d-flex align-items-center">
                <span class="me-2">📋</span>
                <span th:text="${currentLang == 'zh'} ? '我的考勤記錄' : 'My Attendance History'">My Attendance History</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table-lms mb-0">
                        <thead>
                            <tr>
                                <th th:text="${currentLang == 'zh'} ? '會話名稱' : 'Session Name'">Session Name</th>
                                <th th:text="${currentLang == 'zh'} ? '考勤碼' : 'Code'">Code</th>
                                <th th:text="${currentLang == 'zh'} ? '簽到時間' : 'Check-in Time'">Check-in Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="att : ${myAttendance}">
                                <td th:text="${att.sessionName}">Session Name</td>
                                <td><span class="tag tag-blue" th:text="${att.sessionCode}">CODE</span></td>
                                <td th:text="${#temporals.format(att.attendedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 10:00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card-lms" th:unless="${isLoggedIn}">
            <div class="card-body text-center">
                <div class="empty-state">
                    <div class="empty-state-icon">🔒</div>
                    <div class="empty-state-text mb-3" th:text="${currentLang == 'zh'} ? '請登入後進行考勤簽到' : 'Please login to check in'">Please login to check in</div>
                    <a th:href="@{/login}" class="btn-lms btn-lms-primary" th:text="${currentLang == 'zh'} ? '登入' : 'Login'">Login</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>
</body>
</html>
