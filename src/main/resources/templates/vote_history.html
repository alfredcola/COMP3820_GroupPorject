<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '投票歷史' : 'Vote History'">Vote History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar-student}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${currentLang == 'zh'} ? '投票歷史' : 'Vote History'">Vote History</h1>
            <p th:text="${currentLang == 'zh'} ? '查看你的投票記錄' : 'View your voting history'">View your voting history</p>
        </div>
    </div>

    <div class="container">
        <div class="card-lms">
            <div class="card-body p-0">
                <th:block th:if="${not #lists.isEmpty(votes)}">
                    <div class="table-responsive">
                        <table class="table-lms mb-0">
                            <thead>
                                <tr>
                                    <th th:text="${currentLang == 'zh'} ? '投票問題' : 'Poll Question'">Poll Question</th>
                                    <th th:text="${currentLang == 'zh'} ? '我的投票' : 'My Vote'">My Vote</th>
                                    <th th:text="${currentLang == 'zh'} ? '日期' : 'Date'">Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                <th:block th:each="vote : ${votes}">
                                    <tr>
                                        <td>
                                            <a th:href="@{/poll/{id}(id=${vote.poll.id})}" class="text-accent" th:text="${vote.poll.question}">Question</a>
                                        </td>
                                        <td><span class="tag tag-green" th:text="${vote.option.text}">Option</span></td>
                                        <td th:text="${#temporals.format(vote.votedAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                                    </tr>
                                </th:block>
                            </tbody>
                        </table>
                    </div>
                </th:block>
                <th:block th:if="${#lists.isEmpty(votes)}">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div class="empty-state-text" th:text="${currentLang == 'zh'} ? '暫時沒有投票記錄' : 'No votes yet.'">No votes yet.</div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>
</body>
</html>
