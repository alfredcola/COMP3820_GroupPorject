<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '我的Profile' : 'My Profile'">My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar-loggedin}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${currentLang == 'zh'} ? '我的Profile' : 'My Profile'">My Profile</h1>
            <p th:text="${currentLang == 'zh'} ? '查看和更新你的個人信息' : 'View and update your profile'">View and update your profile</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card-lms">
                    <div class="card-body p-4">
                        <div th:if="${param.success}" class="alert-lms alert-lms-success mb-4">
                            <span th:text="${currentLang == 'zh'} ? 'Profile已更新' : 'Profile updated successfully'"></span>
                        </div>
                        
                        <form th:action="@{/profile/update}" method="post">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '用戶名（不可更改）' : 'Username (cannot change)'">Username (cannot change)</label>
                                <input type="text" class="form-control form-control-lms" th:value="${user.username}" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '全名' : 'Full Name'">Full Name</label>
                                <input type="text" name="fullName" class="form-control form-control-lms" th:value="${user.fullName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電郵' : 'Email'">Email</label>
                                <input type="email" name="email" class="form-control form-control-lms" th:value="${user.email}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電話' : 'Phone'">Phone</label>
                                <input type="tel" name="phone" class="form-control form-control-lms" th:value="${user.phone}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '新密碼（留空則保持當前密碼）' : 'New Password (leave blank to keep current)'">New Password (leave blank to keep current)</label>
                                <input type="password" name="newPassword" class="form-control form-control-lms">
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '角色' : 'Role'">Role</label>
                                <input type="text" class="form-control form-control-lms" th:value="${user.role}" disabled>
                            </div>
                            <button type="submit" class="btn-lms btn-lms-primary" th:text="${currentLang == 'zh'} ? '更新Profile' : 'Update Profile'">Update Profile</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>
</body>
</html>
