<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lecture.title}">Video</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar-video}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${lecture.title}">Video Title</h1>
            <p th:text="${currentLang == 'zh'} ? '視頻播放' : 'Video Playback'">Video Playback</p>
        </div>
    </div>

    <div class="container">
        <div class="card-lms mb-4">
            <div class="video-container-lms">
                <video controls preload="metadata">
                    <source th:src="@{/stream/{id}(id=${lecture.id})}" type="video/mp4">
                    <source th:src="@{/stream/{id}(id=${lecture.id})}" type="video/webm">
                    <source th:src="@{/stream/{id}(id=${lecture.id})}" type="video/ogg">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>

        <div class="d-flex gap-2">
            <a th:href="@{/stream/{id}(id=${lecture.id})}" class="btn-lms btn-lms-primary" download>
                📥 <span th:text="${currentLang == 'zh'} ? '下載視頻' : 'Download Video'">Download Video</span>
            </a>
            <a th:href="@{/lecture/{id}(id=${lecture.id})}" class="btn-lms btn-lms-secondary">
                ← <span th:text="${currentLang == 'zh'} ? '返回講義' : 'Back to Lecture'">Back to Lecture</span>
            </a>
        </div>
    </div>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>
</body>
</html>
