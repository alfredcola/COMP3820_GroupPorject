<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '評論歷史' : 'Comment History'">Comment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar-student}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${currentLang == 'zh'} ? '評論歷史' : 'Comment History'">Comment History</h1>
            <p th:text="${currentLang == 'zh'} ? '查看你的評論記錄' : 'View your comment history'">View your comment history</p>
        </div>
    </div>

    <div class="container">
        <div class="card-lms">
            <div class="card-body p-0">
                <th:block th:if="${not #lists.isEmpty(comments)}">
                    <div class="table-responsive">
                        <table class="table-lms mb-0">
                            <thead>
                                <tr>
                                    <th th:text="${currentLang == 'zh'} ? '類型' : 'Type'">Type</th>
                                    <th th:text="${currentLang == 'zh'} ? '來源' : 'Source'">Source</th>
                                    <th th:text="${currentLang == 'zh'} ? '內容' : 'Content'">Content</th>
                                    <th th:text="${currentLang == 'zh'} ? '日期' : 'Date'">Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                <th:block th:each="comment : ${comments}">
                                    <tr>
                                        <td>
                                            <span th:if="${comment.lecture != null}" class="tag tag-blue" th:text="${currentLang == 'zh'} ? '講義' : 'Lecture'">Lecture</span>
                                            <span th:if="${comment.poll != null}" class="tag tag-orange" th:text="${currentLang == 'zh'} ? '投票' : 'Poll'">Poll</span>
                                        </td>
                                        <td>
                                            <a th:if="${comment.lecture != null}" th:href="@{/lecture/{id}(id=${comment.lecture.id})}" class="text-accent" th:text="${comment.lecture.title}">Lecture</a>
                                            <a th:if="${comment.poll != null}" th:href="@{/poll/{id}(id=${comment.poll.id})}" class="text-accent" th:text="${comment.poll.question}">Poll</a>
                                        </td>
                                        <td th:text="${comment.content}">Content</td>
                                        <td th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                                    </tr>
                                </th:block>
                            </tbody>
                        </table>
                    </div>
                </th:block>
                <th:block th:if="${#lists.isEmpty(comments)}">
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text" th:text="${currentLang == 'zh'} ? '暫時沒有評論記錄' : 'No comments yet.'">No comments yet.</div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>
</body>
</html>
