<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '新增投票' : 'Create Poll'">Create Poll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar-admin}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${currentLang == 'zh'} ? '新增投票' : 'Create New Poll'">Create New Poll</h1>
            <p th:text="${currentLang == 'zh'} ? '創建新的投票問題' : 'Create a new poll question'">Create a new poll question</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card-lms">
                    <div class="card-body p-4">
                        <form th:action="@{/admin/poll/create}" method="post">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '問題 *' : 'Question *'">Question *</label>
                                <input type="text" name="question" class="form-control form-control-lms" required th:placeholder="${currentLang == 'zh'} ? '輸入投票問題...' : 'Enter poll question...'">
                            </div>
                            
                            <h5 class="mt-4 mb-3" th:text="${currentLang == 'zh'} ? '選項' : 'Options'">Options</h5>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '選項 1 *' : 'Option 1 *'">Option 1 *</label>
                                    <input type="text" name="option1" class="form-control form-control-lms" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '選項 2 *' : 'Option 2 *'">Option 2 *</label>
                                    <input type="text" name="option2" class="form-control form-control-lms" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '選項 3 *' : 'Option 3 *'">Option 3 *</label>
                                    <input type="text" name="option3" class="form-control form-control-lms" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '選項 4 *' : 'Option 4 *'">Option 4 *</label>
                                    <input type="text" name="option4" class="form-control form-control-lms" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '選項 5 *' : 'Option 5 *'">Option 5 *</label>
                                    <input type="text" name="option5" class="form-control form-control-lms" required>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn-lms btn-lms-primary" th:text="${currentLang == 'zh'} ? '創建投票' : 'Create Poll'">Create Poll</button>
                                <a th:href="@{/}" class="btn-lms btn-lms-secondary" th:text="${currentLang == 'zh'} ? '取消' : 'Cancel'">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>
</body>
</html>
