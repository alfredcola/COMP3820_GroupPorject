<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '用戶管理' : 'User Management'">User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar-admin}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${currentLang == 'zh'} ? '用戶管理' : 'User Management'">User Management</h1>
            <p th:text="${currentLang == 'zh'} ? '管理系統用戶' : 'Manage system users'">Manage system users</p>
        </div>
    </div>

    <div class="container">
        <div class="card-lms mb-4">
            <div class="card-header d-flex align-items-center">
                <span class="me-2">➕</span>
                <span th:text="${currentLang == 'zh'} ? '添加用戶' : 'Add User'">Add User</span>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/user/add}" method="post" class="row g-3">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                    <div class="col-md-2">
                        <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '用戶名' : 'Username'">Username</label>
                        <input type="text" name="username" class="form-control form-control-lms" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '密碼' : 'Password'">Password</label>
                        <input type="password" name="password" class="form-control form-control-lms" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '全名' : 'Full Name'">Full Name</label>
                        <input type="text" name="fullName" class="form-control form-control-lms" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電郵' : 'Email'">Email</label>
                        <input type="email" name="email" class="form-control form-control-lms" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電話' : 'Phone'">Phone</label>
                        <input type="text" name="phone" class="form-control form-control-lms">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '角色' : 'Role'">Role</label>
                        <select name="role" class="form-control form-control-lms" required>
                            <option value="STUDENT" th:text="${currentLang == 'zh'} ? '學生' : 'Student'">Student</option>
                            <option value="TEACHER" th:text="${currentLang == 'zh'} ? '老師' : 'Teacher'">Teacher</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn-lms btn-lms-primary" th:text="${currentLang == 'zh'} ? '添加用戶' : 'Add User'">Add User</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card-lms">
            <div class="card-header d-flex align-items-center">
                <span class="me-2">👥</span>
                <span th:text="${currentLang == 'zh'} ? '用戶列表' : 'User List'">User List</span>
                <span class="tag tag-blue ms-auto" th:text="${users.size()}">0</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table-lms mb-0">
                        <thead>
                            <tr>
                                <th th:text="${currentLang == 'zh'} ? '用戶名' : 'Username'">Username</th>
                                <th th:text="${currentLang == 'zh'} ? '全名' : 'Full Name'">Full Name</th>
                                <th th:text="${currentLang == 'zh'} ? '電郵' : 'Email'">Email</th>
                                <th th:text="${currentLang == 'zh'} ? '電話' : 'Phone'">Phone</th>
                                <th th:text="${currentLang == 'zh'} ? '角色' : 'Role'">Role</th>
                                <th th:text="${currentLang == 'zh'} ? '操作' : 'Actions'">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="comment-avatar me-2" th:text="${#strings.substring(u.fullName, 0, 1)}">U</div>
                                        <span th:text="${u.username}">Username</span>
                                    </div>
                                </td>
                                <td th:text="${u.fullName}">Full Name</td>
                                <td th:text="${u.email}">Email</td>
                                <td th:text="${u.phone}">Phone</td>
                                <td>
                                    <span th:if="${u.role.name() == 'TEACHER'}" class="tag tag-orange" th:text="${currentLang == 'zh'} ? '老師' : 'Teacher'">Teacher</span>
                                    <span th:if="${u.role.name() == 'STUDENT'}" class="tag tag-blue" th:text="${currentLang == 'zh'} ? '學生' : 'Student'">Student</span>
                                </td>
                                <td>
                                    <button type="button" class="btn-lms btn-lms-warning btn-sm" data-bs-toggle="modal" th:data-bs-target="${'#editModal-' + u.id}" th:text="${currentLang == 'zh'} ? '編輯' : 'Edit'">Edit</button>
                                    <form th:action="@{/admin/user/delete/{id}(id=${u.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this user?')">
                                        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-lms btn-lms-danger btn-sm" th:text="${currentLang == 'zh'} ? '刪除' : 'Delete'">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <th:block th:each="u : ${users}">
        <div class="modal fade" th:id="${'editModal-' + u.id}" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="${currentLang == 'zh'} ? '編輯用戶' : 'Edit User'">Edit User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/user/edit/{id}(id=${u.id})}" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '用戶名' : 'Username'">Username</label>
                                <input type="text" class="form-control form-control-lms" th:value="${u.username}" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '全名' : 'Full Name'">Full Name</label>
                                <input type="text" name="fullName" class="form-control form-control-lms" th:value="${u.fullName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電郵' : 'Email'">Email</label>
                                <input type="email" name="email" class="form-control form-control-lms" th:value="${u.email}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '電話' : 'Phone'">Phone</label>
                                <input type="text" name="phone" class="form-control form-control-lms" th:value="${u.phone}">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="${currentLang == 'zh'} ? '取消' : 'Cancel'">Cancel</button>
                            <button type="submit" class="btn btn-primary" th:text="${currentLang == 'zh'} ? '保存' : 'Save'">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
