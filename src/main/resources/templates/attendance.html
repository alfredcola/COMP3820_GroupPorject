<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLang == 'zh'} ? '考勤管理' : 'Attendance Management'">Attendance Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar-admin}"></nav>

    <div class="hero-banner">
        <div class="container">
            <h1 th:text="${currentLang == 'zh'} ? '考勤管理' : 'Attendance Management'">Attendance Management</h1>
            <p th:text="${currentLang == 'zh'} ? '管理學生考勤' : 'Manage student attendance'">Manage student attendance</p>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <div class="card-lms mb-4">
                    <div class="card-header d-flex align-items-center">
                        <span class="me-2">➕</span>
                        <span th:text="${currentLang == 'zh'} ? '創建考勤會話' : 'Create Attendance Session'">Create Attendance Session</span>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/attendance/create}" method="post">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '會話名稱' : 'Session Name'">Session Name</label>
                                <input type="text" name="sessionName" class="form-control form-control-lms" required th:placeholder="${currentLang == 'zh'} ? '例如：Week 1 Lecture' : 'e.g., Week 1 Lecture'">
                            </div>
                            <div class="mb-3">
                                <label class="form-label-lms" th:text="${currentLang == 'zh'} ? '持續時間（分鐘）' : 'Duration (minutes)'">Duration (minutes)</label>
                                <input type="number" name="durationMinutes" class="form-control form-control-lms" value="60" min="5" max="180">
                            </div>
                            <button type="submit" class="btn-lms btn-lms-primary" th:text="${currentLang == 'zh'} ? '創建會話' : 'Create Session'">Create Session</button>
                        </form>
                    </div>
                </div>

                <div class="card-lms mb-4">
                    <div class="card-header" th:text="${currentLang == 'zh'} ? '快速鏈接' : 'Quick Links'">Quick Links</div>
                    <div class="card-body">
                        <div class="d-flex flex-column gap-2">
                            <a th:href="@{/attendance}" class="btn-lms btn-lms-success">
                                📱 <span th:text="${currentLang == 'zh'} ? '學生考勤頁面' : 'Go to Student Attendance Page'">Go to Student Attendance Page</span>
                            </a>
                            <a th:href="@{/admin/attendance/all}" class="btn-lms btn-lms-secondary">
                                📋 <span th:text="${currentLang == 'zh'} ? '所有考勤會話' : 'All Sessions'">All Sessions</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6" th:if="${param.code != null}">
                <div class="card-lms mb-4">
                    <div class="card-header d-flex align-items-center">
                        <span class="me-2">📱</span>
                        <span th:text="${currentLang == 'zh'} ? '考勤二維碼' : 'Attendance QR Code'">Attendance QR Code</span>
                    </div>
                    <div class="card-body text-center">
                        <p class="text-muted-custom mb-3" th:text="${currentLang == 'zh'} ? '讓學生掃描此二維碼進行簽到' : 'Let students scan this QR code to check in'">Let students scan this QR code to check in</p>
                        
                        <div class="alert-lms alert-lms-info mb-3">
                            <h3 class="mb-0" th:text="${param.code[0]}">CODE</h3>
                        </div>
                        
                        <canvas id="qrCanvas" class="mb-3 mx-auto" style="max-width: 250px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-lms">
        <div class="container">
            <p>COMP 3820SEF - Web Applications Course Management System</p>
        </div>
    </footer>

    <script th:if="${param.code != null}">
        const code = "[[${param.code[0]}]]";
        const url = window.location.origin + "/attendance/mark?code=" + code;
        
        QRCode.toCanvas(document.getElementById('qrCanvas'), url, {
            width: 250,
            margin: 2
        }, function(error) {
            if (error) console.error(error);
        });
    </script>
</body>
</html>
